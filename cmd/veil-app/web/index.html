<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Veil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050608;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--glass3:rgba(255,255,255,0.12);
  --tx:#f8fafc;--tx2:#94a3b8;--tx3:#475569;--tx4:#1e293b;
  --ac:#7c3aed;--ac2:#8b5cf6;--ac3:#a78bfa;
  --gn:#10b981;--gn2:#34d399;--gn3:#059669;
  --rd:#ef4444;--yl:#f59e0b;
  --rr:16px;
  --tr:all .35s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}

/* ── Animated mesh background ── */
.mesh{position:fixed;inset:0;overflow:hidden;z-index:0}
.mesh i{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;will-change:transform}
.mesh .m1{width:500px;height:500px;background:#7c3aed;top:-10%;left:20%;animation:float1 25s ease-in-out infinite}
.mesh .m2{width:350px;height:350px;background:#3b82f6;bottom:10%;right:15%;animation:float2 20s ease-in-out infinite}
.mesh .m3{width:250px;height:250px;background:#8b5cf6;top:50%;left:60%;animation:float3 22s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(80px,40px) scale(1.1)}66%{transform:translate(-40px,-60px) scale(.9)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,40px)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-50px)}}

/* ── Main layout ── */
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:20px 32px}
.brand{font-size:22px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--ac3),var(--ac),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hnav{display:flex;gap:6px}
.hbtn{background:var(--glass);border:1px solid transparent;color:var(--tx2);padding:8px 14px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr);font-family:inherit;backdrop-filter:blur(20px)}
.hbtn:hover{background:var(--glass2);color:var(--tx);border-color:var(--glass2)}

/* ── Connect hero ── */
.hero{display:flex;flex-direction:column;align-items:center;gap:0;margin-top:-20px}

/* Ring */
.ring-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.ring-outer{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--glass2);transition:var(--tr)}
.ring-glow{position:absolute;inset:-30px;border-radius:50%;opacity:0;transition:opacity .8s}
.connected .ring-glow{opacity:1;background:radial-gradient(circle,rgba(16,185,129,.1) 0%,transparent 70%)}
.connecting .ring-glow{opacity:1;background:radial-gradient(circle,rgba(245,158,11,.08) 0%,transparent 70%)}
.ring-svg{position:absolute;inset:-3px;transform:rotate(-90deg)}
.ring-svg circle{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-dasharray:628;stroke-dashoffset:628;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.connected .ring-svg circle{stroke:var(--gn);stroke-dashoffset:0}
.connecting .ring-svg circle{stroke:var(--yl);animation:ring-spin 2.5s linear infinite}
@keyframes ring-spin{from{stroke-dashoffset:628}to{stroke-dashoffset:0}}

/* Button */
.cbtn{width:130px;height:130px;border-radius:50%;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.9);transition:var(--tr);position:relative;z-index:2;letter-spacing:1px;text-transform:uppercase}
.cbtn.off{background:linear-gradient(145deg,#6d28d9,#7c3aed);box-shadow:0 0 40px rgba(124,58,237,.25),inset 0 1px 0 rgba(255,255,255,.1)}
.cbtn.off:hover{transform:scale(1.06);box-shadow:0 0 60px rgba(124,58,237,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.cbtn.off:active{transform:scale(.96)}
.cbtn.on{background:linear-gradient(145deg,var(--gn3),var(--gn));box-shadow:0 0 40px rgba(16,185,129,.25),inset 0 1px 0 rgba(255,255,255,.1)}
.cbtn.on:hover{box-shadow:0 0 60px rgba(16,185,129,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.cbtn.wait{background:linear-gradient(145deg,#b45309,var(--yl));box-shadow:0 0 40px rgba(245,158,11,.2);pointer-events:none;animation:btn-pulse 1.5s ease-in-out infinite}
@keyframes btn-pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* Status text */
.stblock{text-align:center}
.stblock h2{font-size:20px;font-weight:700;margin-bottom:2px;transition:var(--tr)}
.stblock p{font-size:12px;color:var(--tx3);font-weight:400}
.stblock .srv-pill{display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:5px 14px;background:var(--glass);border:1px solid var(--glass2);border-radius:24px;font-size:11px;color:var(--tx2);font-family:'JetBrains Mono','SF Mono','Courier New',monospace;backdrop-filter:blur(10px);transition:var(--tr)}
.srv-pill .sd{width:6px;height:6px;border-radius:50%;background:var(--tx3);transition:var(--tr)}
.connected .srv-pill .sd{background:var(--gn);box-shadow:0 0 8px var(--gn)}

/* ── Stats row ── */
.stats-row{display:flex;gap:10px;margin-top:32px}
.chip{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--glass2);border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:10px;transition:var(--tr)}
.chip:hover{background:var(--glass2);border-color:var(--glass3)}
.chip .clbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3)}
.chip .cval{font-size:16px;font-weight:700;font-feature-settings:'tnum';letter-spacing:-.3px}
.chip .cval.c1{color:var(--ac3)}
.chip .cval.c2{color:var(--gn2)}
.chip .cval.c3{color:var(--tx2)}
.morph-chip{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--glass2);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:8px;transition:var(--tr)}
.morph-chip:hover{background:var(--glass2)}
.morph-chip .mc-dot{width:5px;height:5px;border-radius:50%;background:var(--ac2)}
.morph-chip .mc-name{font-size:11px;font-weight:600;color:var(--ac3);letter-spacing:.3px}

/* ── Bottom graph strip ── */
.gstrip{position:fixed;bottom:0;left:0;right:0;height:48px;z-index:5;background:linear-gradient(180deg,transparent,rgba(5,6,8,.9))}
.gstrip canvas{width:100%;height:48px;display:block}
.gstrip .glabel{position:absolute;bottom:8px;left:20px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);opacity:.6}
.gstrip .glive{position:absolute;bottom:8px;right:20px;display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;color:var(--gn);opacity:0;transition:opacity .3s}
.gstrip .glive.on{opacity:.7}
.gstrip .glive::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gn);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── Settings Modal ── */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;justify-content:center}
.sov.on{opacity:1;pointer-events:auto}
.scard{background:rgba(12,14,22,.95);backdrop-filter:blur(40px);border:1px solid var(--glass2);border-radius:20px;padding:0;width:92%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:translateY(20px) scale(.97);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sov.on .scard{transform:translateY(0) scale(1)}
.scard-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 16px}
.scard-hdr h2{font-size:15px;font-weight:700}
.sclose{background:var(--glass);border:none;color:var(--tx3);width:28px;height:28px;border-radius:8px;cursor:pointer;transition:var(--tr);font-size:16px;display:flex;align-items:center;justify-content:center}
.sclose:hover{background:var(--glass2);color:var(--tx)}
.scard-body{padding:0 24px 8px;display:flex;flex-direction:column;gap:14px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3)}
.ff input{width:100%;background:var(--glass);border:1px solid var(--glass2);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:var(--tr)}
.ff input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.ff input::placeholder{color:var(--tx4)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Custom Select ── */
.csel{position:relative}
.csel-btn{width:100%;background:var(--glass);border:1px solid var(--glass2);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:var(--tr);text-align:left;display:flex;justify-content:space-between;align-items:center}
.csel-btn:hover{border-color:var(--glass3)}
.csel-btn.open{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.csel-btn::after{content:'';width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--tx3);transition:transform .2s}
.csel-btn.open::after{transform:rotate(180deg)}
.csel-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(15,17,28,.97);backdrop-filter:blur(20px);border:1px solid var(--glass2);border-radius:12px;padding:4px;z-index:20;display:none;box-shadow:0 16px 48px rgba(0,0,0,.5);max-height:180px;overflow-y:auto}
.csel-drop.open{display:block;animation:dropIn .2s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.csel-opt{padding:9px 12px;border-radius:8px;font-size:12px;color:var(--tx2);cursor:pointer;transition:background .15s,color .15s}
.csel-opt:hover{background:var(--glass2);color:var(--tx)}
.csel-opt.active{background:rgba(124,58,237,.15);color:var(--ac3)}

/* Export link */
.exp-row{display:flex;gap:6px}
.exp-row input{flex:1}
.exp-copy{padding:10px 14px;background:var(--glass2);border:1px solid var(--glass2);border-radius:10px;color:var(--tx2);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:var(--tr);white-space:nowrap}
.exp-copy:hover{background:var(--glass3);color:var(--tx)}

.scard-footer{padding:14px 24px 20px;display:flex;gap:8px}
.sbtn{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--tr)}
.sbtn-save{background:var(--ac);color:#fff}.sbtn-save:hover{background:#6d28d9;transform:translateY(-1px)}
.sbtn-cancel{background:var(--glass);color:var(--tx2);border:1px solid var(--glass2)}.sbtn-cancel:hover{background:var(--glass2);color:var(--tx)}

/* ── Import Modal ── */
.iov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;justify-content:center}
.iov.on{opacity:1;pointer-events:auto}
.icard{background:rgba(12,14,22,.95);backdrop-filter:blur(40px);border:1px solid var(--glass2);border-radius:20px;width:90%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:translateY(20px) scale(.97);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.iov.on .icard{transform:translateY(0) scale(1)}
.icard-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 16px}
.icard-hdr h2{font-size:15px;font-weight:700}
.icard-body{padding:0 24px 20px;display:flex;flex-direction:column;gap:14px}

/* ── Toast notifications ── */
.toasts{position:fixed;bottom:60px;right:20px;z-index:50;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{padding:10px 16px;background:rgba(15,17,28,.9);backdrop-filter:blur(20px);border:1px solid var(--glass2);border-radius:10px;font-size:12px;color:var(--tx2);animation:toastIn .3s ease,toastOut .4s ease 3.5s forwards;pointer-events:auto;max-width:320px}
.toast.success{border-left:3px solid var(--gn)}
.toast.error{border-left:3px solid var(--rd)}
.toast.stream{border-left:3px solid var(--ac2)}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(30px)}}

/* ── Welcome ── */
.welcome{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;text-align:center}
.welcome.hidden{display:none}
.wbox{max-width:360px}
.wbox h1{font-size:42px;font-weight:800;letter-spacing:3px;margin-bottom:12px;background:linear-gradient(135deg,var(--ac3),var(--ac),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wbox p{color:var(--tx2);font-size:14px;line-height:1.7;margin-bottom:32px}
.wbtns{display:flex;gap:10px;justify-content:center}
.wb{padding:12px 28px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--tr);border:none}
.wb1{background:var(--ac);color:#fff;box-shadow:0 4px 24px rgba(124,58,237,.3)}.wb1:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.5)}
.wb2{background:var(--glass);color:var(--tx2);border:1px solid var(--glass2)}.wb2:hover{background:var(--glass2);color:var(--tx)}
</style>
</head>
<body>
<div class="mesh"><i class="m1"></i><i class="m2"></i><i class="m3"></i></div>

<!-- Welcome -->
<div class="welcome" id="welcome">
<div class="wbox">
 <h1>VEIL <span style="background:linear-gradient(135deg,#94a3b8,#e2e8f0,#64748b);-webkit-background-clip:text;-webkit-text-fill-color:transparent">core</span></h1>
 <p>Stealth tunneling that makes your traffic indistinguishable from normal browsing.</p>
 <div class="wbtns">
  <button class="wb wb1" onclick="oImp()">Import Link</button>
  <button class="wb wb2" onclick="hideWelcome();oSet()">Configure</button>
 </div>
</div>
</div>

<!-- App -->
<div class="app" id="app" style="display:none">

<div class="hdr">
 <div class="brand">VEIL <span style="background:linear-gradient(135deg,#94a3b8,#e2e8f0,#64748b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;letter-spacing:2px">core</span></div>
 <div class="hnav">
  <button class="hbtn" onclick="oImp()">Import</button>
  <button class="hbtn" onclick="oSet()">Settings</button>
 </div>
</div>

<div class="hero" id="connSec">
 <div class="ring-wrap">
  <div class="ring-glow"></div>
  <div class="ring-outer"></div>
  <svg class="ring-svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="97"/></svg>
  <button class="cbtn off" id="cbtn" onclick="go()">Connect</button>
 </div>
 <div class="stblock">
  <h2 id="stxt">Disconnected</h2>
  <p id="stxt2">Tap to connect</p>
  <div class="srv-pill" id="srvPill" style="display:none"><span class="sd"></span><span id="srvAddr">-</span></div>
 </div>

 <div class="stats-row">
  <div class="chip"><div><div class="clbl">Traffic</div><div class="cval c1" id="bw">0 B</div></div></div>
  <div class="chip"><div><div class="clbl">Streams</div><div class="cval c2" id="cn">0</div></div></div>
  <div class="chip"><div><div class="clbl">Uptime</div><div class="cval c3" id="up">-</div></div></div>
  <div class="morph-chip"><span class="mc-dot"></span><span class="mc-name" id="morphB">http2_browsing</span></div>
 </div>
</div>

</div>

<!-- Bottom graph -->
<div class="gstrip">
 <canvas id="graph" height="48"></canvas>
 <span class="glabel">throughput</span>
 <span class="glive" id="glive">Live</span>
</div>

<!-- Toasts -->
<div class="toasts" id="toasts"></div>

<!-- Settings -->
<div class="sov" id="sov" onclick="e_cSet(event)">
<div class="scard" onclick="event.stopPropagation()">
 <div class="scard-hdr"><h2>Settings</h2><button class="sclose" onclick="cSet()">&times;</button></div>
 <div class="scard-body">
  <div class="ff"><label>Server</label><input id="xSrv" placeholder="1.2.3.4:8443" spellcheck="false"></div>
  <div class="ff"><label>Secret</label><input id="xSec" type="password" placeholder="Pre-shared secret"></div>
  <div class="frow">
   <div class="ff"><label>Transport</label>
    <div class="csel" id="cselTr" data-field="xTr">
     <button class="csel-btn" onclick="togSel(this)"><span>Raw TCP</span></button>
     <div class="csel-drop">
      <div class="csel-opt active" data-val="raw" onclick="pickSel(this)">Raw TCP</div>
      <div class="csel-opt" data-val="tls" onclick="pickSel(this)">TLS</div>
      <div class="csel-opt" data-val="wss" onclick="pickSel(this)">WebSocket</div>
     </div>
    </div>
   </div>
   <div class="ff"><label>Cipher</label>
    <div class="csel" id="cselCi" data-field="xCi">
     <button class="csel-btn" onclick="togSel(this)"><span>ChaCha20-Poly1305</span></button>
     <div class="csel-drop">
      <div class="csel-opt active" data-val="chacha20-poly1305" onclick="pickSel(this)">ChaCha20-Poly1305</div>
      <div class="csel-opt" data-val="aes-256-gcm" onclick="pickSel(this)">AES-256-GCM</div>
     </div>
    </div>
   </div>
  </div>
  <div class="ff"><label>Morph Profile</label>
   <div class="csel" id="cselMo" data-field="xMo">
    <button class="csel-btn" onclick="togSel(this)"><span>http2_browsing</span></button>
    <div class="csel-drop" id="moDropdown"></div>
   </div>
  </div>
  <div class="frow">
   <div class="ff"><label>SOCKS5 Bind</label><input id="xSo" placeholder="127.0.0.1:1080" spellcheck="false"></div>
   <div class="ff"><label>SNI Override</label><input id="xSni" placeholder="example.com" spellcheck="false"></div>
  </div>
  <div class="ff"><label>Export Link</label>
   <div class="exp-row"><input id="xLink" readonly spellcheck="false"><button class="exp-copy" onclick="cpLink()">Copy</button></div>
  </div>
 </div>
 <div class="scard-footer">
  <button class="sbtn sbtn-save" onclick="sSet()">Save</button>
  <button class="sbtn sbtn-cancel" onclick="cSet()">Cancel</button>
 </div>
</div>
</div>

<!-- Import -->
<div class="iov" id="iov" onclick="e_cImp(event)">
<div class="icard" onclick="event.stopPropagation()">
 <div class="icard-hdr"><h2>Import Link</h2><button class="sclose" onclick="cImp()">&times;</button></div>
 <div class="icard-body">
  <div class="ff"><label>Paste veil:// link</label><input id="impLink" placeholder="veil://..." spellcheck="false"></div>
  <div style="display:flex;gap:8px">
   <button class="sbtn sbtn-save" onclick="doImp()">Import</button>
   <button class="sbtn sbtn-cancel" onclick="cImp()">Cancel</button>
  </div>
 </div>
</div>
</div>

<script>
let W,C=false,UP=0,UT,profiles=[];
const GD=new Array(60).fill(0);
let lastB=0;
// Hidden fields for select values
const SF={xTr:'raw',xMo:'http2_browsing',xCi:'chacha20-poly1305'};

function $(id){return document.getElementById(id)}
function J(o){return JSON.stringify(o)}

function init(){
  W=new WebSocket('ws://'+location.host+'/ws');
  W.onopen=()=>{W.send(J({action:'get_config'}));W.send(J({action:'list_profiles'}))};
  W.onmessage=e=>{
    const m=JSON.parse(e.data);
    switch(m.type){
      case'status':uSt(m);break;
      case'stats':uStats(m);break;
      case'log':toast(m.text,m.level);break;
      case'config':uCfg(m);break;
      case'profiles':uProf(m);break;
      case'import_ok':cImp();uCfg(m);toast('Link imported!','success');break;
      case'import_err':toast('Import: '+m.text,'error');break;
    }
  };
  W.onclose=()=>setTimeout(init,2000);
}

function hideWelcome(){$('welcome').classList.add('hidden');$('app').style.display='flex'}

function uSt(m){
  const sec=$('connSec'),btn=$('cbtn'),gl=$('glive');
  sec.classList.remove('connected','connecting');
  if(m.state==='connected'){
    C=true;sec.classList.add('connected');
    btn.className='cbtn on';btn.textContent='Stop';
    $('stxt').textContent='Protected';$('stxt2').textContent='Traffic is morphed and encrypted';
    gl.classList.add('on');startUp();
  }else if(m.state==='connecting'){
    sec.classList.add('connecting');
    btn.className='cbtn wait';btn.textContent='•••';
    $('stxt').textContent='Connecting';$('stxt2').textContent='Establishing tunnel...';
  }else{
    C=false;btn.className='cbtn off';btn.textContent='Connect';
    $('stxt').textContent='Disconnected';$('stxt2').textContent='Tap to connect';
    gl.classList.remove('on');stopUp();
  }
}

function uStats(m){
  $('bw').textContent=m.bytes;$('cn').textContent=m.conns;
  const b=parseB(m.bytes),delta=b-lastB;lastB=b;
  GD.push(Math.max(0,delta));GD.shift();drawGraph();
}

function uCfg(c){
  if(c.server){
    hideWelcome();
    $('srvPill').style.display='inline-flex';$('srvAddr').textContent=c.server;
    $('morphB').textContent=c.morph||'http2_browsing';
    $('xSrv').value=c.server||'';$('xSec').value=c.secret||'';
    $('xSo').value=c.socks||'127.0.0.1:1080';$('xSni').value=c.sni||'';
    setSel('cselTr',c.transport||'raw');
    setSel('cselMo',c.morph||'http2_browsing');
    setSel('cselCi',c.cipher||'chacha20-poly1305');
    SF.xTr=c.transport||'raw';SF.xMo=c.morph||'http2_browsing';SF.xCi=c.cipher||'chacha20-poly1305';
    const lk='veil://'+btoa([c.server,c.secret,c.transport||'raw',c.morph||'',c.cipher||'',c.sni||''].join('|'));
    $('xLink').value=lk;
  }
}

function uProf(m){
  profiles=m.profiles||[];
  const dd=$('moDropdown');
  dd.innerHTML='';
  profiles.forEach(p=>{
    const d=document.createElement('div');
    d.className='csel-opt'+(p.name===SF.xMo?' active':'');
    d.setAttribute('data-val',p.name);
    d.textContent=p.name;
    d.onclick=function(){pickSel(this)};
    dd.appendChild(d);
  });
}

/* ── Custom Select ── */
function togSel(btn){
  // Close all other selects first
  document.querySelectorAll('.csel-btn.open').forEach(b=>{if(b!==btn){b.classList.remove('open');b.nextElementSibling.classList.remove('open')}});
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}
function pickSel(opt){
  const drop=opt.parentElement;
  const csel=drop.parentElement;
  const btn=csel.querySelector('.csel-btn');
  const field=csel.dataset.field;
  drop.querySelectorAll('.csel-opt').forEach(o=>o.classList.remove('active'));
  opt.classList.add('active');
  btn.querySelector('span').textContent=opt.textContent;
  btn.classList.remove('open');drop.classList.remove('open');
  SF[field]=opt.dataset.val;
}
function setSel(cselId,val){
  const csel=$(cselId);if(!csel)return;
  const btn=csel.querySelector('.csel-btn span');
  const opts=csel.querySelectorAll('.csel-opt');
  opts.forEach(o=>{
    o.classList.remove('active');
    if(o.dataset.val===val){o.classList.add('active');btn.textContent=o.textContent}
  });
}
// Close selects on outside click
document.addEventListener('click',e=>{if(!e.target.closest('.csel')){document.querySelectorAll('.csel-btn.open').forEach(b=>{b.classList.remove('open');b.nextElementSibling.classList.remove('open')})}});

/* ── Timers ── */
function startUp(){UP=Date.now();UT=setInterval(updUp,1000)}
function stopUp(){clearInterval(UT);$('up').textContent='-';UP=0}
function updUp(){
  if(!UP)return;const s=Math.floor((Date.now()-UP)/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  $('up').textContent=(h?h+'h ':'')+(m?m+'m ':'')+ss+'s';
}

/* ── Graph ── */
function parseB(s){const m=s.match(/([\d.]+)\s*(B|KB|MB|GB)/);if(!m)return 0;const v=parseFloat(m[1]),u=m[2];return u==='GB'?v*1073741824:u==='MB'?v*1048576:u==='KB'?v*1024:v}

function drawGraph(){
  const c=$('graph'),ctx=c.getContext('2d');
  const cW=c.width=c.offsetWidth,cH=c.height=48;
  ctx.clearRect(0,0,cW,cH);
  const mx=Math.max(1,...GD),step=cW/59;
  const grd=ctx.createLinearGradient(0,0,0,cH);
  grd.addColorStop(0,'rgba(124,58,237,0.3)');grd.addColorStop(1,'transparent');
  ctx.beginPath();ctx.moveTo(0,cH);
  for(let i=0;i<60;i++){const x=i*step,y=cH-(GD[i]/mx)*(cH-4);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.lineTo(cW,cH);ctx.closePath();ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();
  for(let i=0;i<60;i++){const x=i*step,y=cH-(GD[i]/mx)*(cH-4);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.strokeStyle='rgba(139,92,246,0.5)';ctx.lineWidth=1.5;ctx.stroke();
}

/* ── Toasts ── */
function toast(text,level){
  const t=document.createElement('div');
  t.className='toast'+(level?' '+level:'');
  t.textContent=text;
  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(),4000);
  // Keep max 5
  const tc=$('toasts');while(tc.children.length>5)tc.removeChild(tc.firstChild);
}

/* ── Actions ── */
function go(){
  if(!C){
    if(!$('xSrv').value){toast('Configure server first','error');oSet();return}
    W.send(J({action:'connect'}));
  }else{W.send(J({action:'disconnect'}))}
}

function oSet(){$('sov').classList.add('on')}
function cSet(){$('sov').classList.remove('on')}
function e_cSet(e){if(e.target===$('sov'))cSet()}

function sSet(){
  W.send(J({action:'save_config',server:$('xSrv').value,secret:$('xSec').value,
    transport:SF.xTr,morph:SF.xMo,cipher:SF.xCi,
    sni:$('xSni').value,socks:$('xSo').value}));
  cSet();toast('Settings saved','success');
}

function oImp(){$('impLink').value='';$('iov').classList.add('on');setTimeout(()=>$('impLink').focus(),250)}
function cImp(){$('iov').classList.remove('on')}
function e_cImp(e){if(e.target===$('iov'))cImp()}
function doImp(){const l=$('impLink').value.trim();if(!l)return;W.send(J({action:'import_link',link:l}));cImp()}
function cpLink(){const i=$('xLink');i.select();document.execCommand('copy');toast('Link copied','success')}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){cSet();cImp()}
  if(e.key==='Enter'&&$('iov').classList.contains('on'))doImp();
});

window.onload=()=>{init();drawGraph()};
</script>
